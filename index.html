<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uma surpresa ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MÚSICA -->
<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<!-- BOTÃO MÚSICA -->
<button id="btnMusica" onclick="toggleMusica()">🔊</button>

<!-- TELA 1 -->
<div class="tela ativa" id="tela1">
    <h1>Oi Meu amor...</h1>
    <button onclick="proximaTela(2); iniciarMusica()">Clique aqui</button>
</div>

<!-- TELA 2 -->
<div class="tela" id="tela2">
    <h1>Eu tenho algo pra te dizer...</h1>
    <button onclick="proximaTela(3)">Continuar</button>
</div>

<!-- TELA 3 -->
<div class="tela" id="tela3">
    <h1>Promete que vai ler até o final? 👀</h1>
    <button onclick="proximaTela(4)">Prometo</button>
</div>

<!-- TELA 4 -->
<div class="tela" id="tela4">
    <div class="envelope" onclick="abrirCarta(this)">
        <div class="tampa"></div>

        <div class="carta">
            <h3>💌 Para você</h3>
            <p>
                Você é muito especial pra mim ❤️<br><br>
                Eu só queria te lembrar disso hoje.<br><br>
                Nunca esqueça o quanto você é incrível
            </p>
            <br>
            <button onclick="proximaTela(5)">Ver nossos momentos</button>
        </div>
    </div>
</div>

<!-- TELA 5 -->
<div class="tela" id="tela5">
    <h1>Nossos momentos ❤️</h1>

    <div class="galeria">
        <img src="./foto1.jpeg" onclick="abrirModal(this.src)">
        <img src="./foto2.jpeg" onclick="abrirModal(this.src)">
        <img src="./foto3.jpeg" onclick="abrirModal(this.src)">
        <img src="./foto4.jpeg" onclick="abrirModal(this.src)">
        <img src="./foto5.jpeg" onclick="abrirModal(this.src)">
        <img src="./foto6.jpeg" onclick="abrirModal(this.src)">
        <img src="./foto7.jpeg" onclick="abrirModal(this.src)">
        <img src="./foto8.jpeg" onclick="abrirModal(this.src)">
    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="fecharModal()">
    <img id="imgModal">
</div>

<script src="script.js"></script>
</body>
</html>
